services:
  - type: web
    name: nexus-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    disk:
      name: nexus-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
